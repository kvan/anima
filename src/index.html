<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pixel Terminal</title>
  <link rel="icon" type="image/svg+xml" href="logo-16.svg" />
  <link rel="stylesheet" href="styles.css" />
  <!-- marked loaded as UMD global -->
  <script src="marked.umd.js"></script>
</head>
<body>
  <div id="drag-region" data-tauri-drag-region>
    <img src="pixel-claude-logo.png" id="app-title-img" alt="PIXEL CLAUDE" />
  </div>
  <div id="about-overlay" class="hidden">
    <div id="about-box">
      <img src="logo-pxc.svg" id="about-logo" alt="PxC" />
      <div id="about-name">PIXEL CLAUDE</div>
      <div id="about-meta">v0.1.0 — BRADLEY TANGONAN</div>
      <div id="about-btns">
        <button id="about-close">close</button>
      </div>
    </div>
  </div>
  <div id="confirm-overlay" class="hidden">
    <div id="confirm-box">
      <div id="confirm-msg"></div>
      <div id="confirm-btns">
        <button id="confirm-cancel">cancel</button>
        <button id="confirm-ok">terminate</button>
      </div>
    </div>
  </div>
  <div id="app">

    <!-- SIDEBAR -->
    <div id="sidebar">
      <div id="sidebar-header">
        <span class="pixel-label">SESSIONS</span>
        <div id="session-tabs">
          <button class="session-tab active" data-tab="live">LIVE</button>
          <button class="session-tab" data-tab="hist">HIST</button>
        </div>
        <button id="btn-new-session" title="New Session">＋</button>
      </div>
      <div id="session-list">
        <!-- session cards injected by app.js -->
      </div>
      <div id="history-view" class="hidden">
        <div id="history-search-wrap">
          <input id="history-search" type="text" placeholder="search sessions..."
                 autocorrect="off" autocomplete="off" spellcheck="false" />
        </div>
        <div id="history-list"></div>
      </div>
      <div id="sidebar-h-resize"></div>
      <div id="voice-log-header">
        <span class="pixel-label">VOICE LOG</span>
        <button id="btn-clear-voice-log" title="Clear voice log">CLR</button>
      </div>
      <div id="voice-log"></div>
      <div id="attachments-header">
        <span class="pixel-label">ATTACHMENTS</span>
        <button id="btn-clear-attachments" title="Clear sent attachments">CLR</button>
      </div>
      <div id="attachments-panel">
        <div class="att-empty">drop files here</div>
      </div>
    </div>

    <div id="sidebar-resize"></div>

    <!-- MAIN PANE -->
    <div id="main">

      <!-- Chat view -->
      <div id="chat-view">

        <div id="history-find" class="hidden">
          <input id="history-find-input" type="text" placeholder="search in session…"
                 autocorrect="off" autocomplete="off" spellcheck="false" />
          <span id="history-find-status"></span>
          <button id="history-find-prev" title="Previous (Shift+Enter)">↑</button>
          <button id="history-find-next" title="Next (Enter)">↓</button>
          <button id="history-find-close" title="Close (Esc)">✕</button>
        </div>

        <div id="message-log"></div>

        <div id="drop-indicator" class="hidden">drop files to attach</div>
        <div id="slash-menu" class="hidden"></div>
        <div id="input-bar">
          <div id="attachment-tokens" class="hidden"></div>
          <div id="input-row">
          <textarea
            id="msg-input"
            placeholder="Message Claude Code..."
            rows="1"
            autofocus
            autocorrect="off"
            autocomplete="off"
            autocapitalize="off"
            spellcheck="false"
          ></textarea>
          <button id="btn-send" title="Send (Enter)" style="display:none"></button>
          <button id="omi-indicator" title="Omi voice bridge (disconnected)" aria-label="Toggle Omi listening"></button>
          <button id="always-on-btn" title="Always-on mode — transcribes everything. Hold fn for push-to-talk instead. (Ctrl+Shift+A)" aria-label="Toggle always-on mic">OPEN</button>
          <button id="settings-btn" title="Voice settings">⚙</button>
          <div id="settings-panel" class="hidden">
            <div class="settings-row">
              <span class="pixel-label">MIC SOURCE</span>
              <button id="voice-source-ble" class="source-btn" title="Use Omi BLE pendant">BLE</button>
              <button id="voice-source-mic" class="source-btn" title="Use MacBook Pro Microphone">MIC</button>
            </div>
          </div>
          </div>
        </div>
      </div>

    </div>
  </div>

  <div id="attachment-ctx-menu" class="hidden">
    <button data-ctx="reveal">Reveal in Finder</button>
    <button data-ctx="reattach">Re-attach</button>
    <button data-ctx="remove">Remove</button>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
